name: Deploy Shiny App to shinyapps.io

on:
  push:
    branches:
      - main
    paths:
      - 'shiny_app/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up R ────────────────────────────────────────────────────────
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true   # Use RStudio Public Package Manager (faster binaries)

      # ── 3. Install system libraries ────────────────────────────────────────
      #    Needed for sf, terra, ggplot2, curl-based packages, and XML parsing
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev \
            libgeos-dev \
            libudunits2-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      # ── 4. Cache R packages ────────────────────────────────────────────────
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('shiny_app/DESCRIPTION', 'shiny_app/*.R') }}
          restore-keys: |
            ${{ runner.os }}-r-

      # ── 5. Install R packages ──────────────────────────────────────────────
      - name: Install R packages
        run: |
          install.packages(c(
            "shiny",
            "ggplot2",
            "dplyr",
            "tidyr",
            "rhandsontable",
            "gridExtra",
            "rsconnect"
          ), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      # ── 6. Deploy to shinyapps.io ──────────────────────────────────────────
      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN:   ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET:  ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          rsconnect::setAccountInfo(
            name   = Sys.getenv("SHINYAPPS_ACCOUNT"),
            token  = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET")
          )
          rsconnect::deployApp(
            appDir        = "shiny_app",
            appName       = "my-shiny-app",   # <-- rename this to your desired URL slug
            account       = Sys.getenv("SHINYAPPS_ACCOUNT"),  # statistiek-in-de-criminologie
            forceUpdate   = TRUE,
            launch.browser = FALSE
          )
        shell: Rscript {0}
